<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    Auto-placed items in a column-subgridded axis wrap into the subgrid's own implicit rows
  </title>
</head>
<body>

<div id="test-root" style="width: 200px; display: grid; grid-template-columns: 100px 100px; grid-auto-rows: 40px;">
  <div style="display: grid; grid-template-columns: subgrid; grid-auto-rows: 30px; grid-column: 1 / 3;">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

</body>
</html>
