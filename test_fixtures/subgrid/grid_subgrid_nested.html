<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    A subgrid nested inside another subgrid adopts the tracks of the outermost grid
  </title>
</head>
<body>

<div id="test-root" style="display: grid; grid-template-columns: auto auto; grid-template-rows: 50px;">
  <div style="display: grid; grid-template-columns: subgrid; grid-template-rows: 50px; grid-column: 1 / 3;">
    <div style="display: grid; grid-template-columns: subgrid; grid-template-rows: 50px; grid-column: 1 / 3;">
      <div style="width: 40px;"></div>
      <div style="width: 60px;"></div>
    </div>
  </div>
</div>

</body>
</html>
