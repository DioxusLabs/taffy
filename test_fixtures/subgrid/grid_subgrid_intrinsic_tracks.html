<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    Items of a subgrid participate in the sizing of the parent grid's intrinsically-sized tracks
  </title>
</head>
<body>

<div id="test-root" style="display: grid; grid-template-columns: auto auto; grid-template-rows: auto;">
  <div style="display: grid; grid-template-columns: subgrid; grid-template-rows: subgrid; grid-column: 1 / 3; grid-row: 1 / 2;">
    <div style="width: 30px; height: 20px;"></div>
    <div style="width: 80px; height: 40px;"></div>
  </div>
</div>

</body>
</html>
