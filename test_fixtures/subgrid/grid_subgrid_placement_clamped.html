<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    Item placements in a subgridded axis are clamped to the subgrid's explicit grid (a subgrid has no implicit tracks)
  </title>
</head>
<body>

<div id="test-root" style="width: 200px; height: 100px; display: grid; grid-template-columns: 100px 100px; grid-template-rows: 100px;">
  <div style="display: grid; grid-template-columns: subgrid; grid-template-rows: subgrid; grid-column: 1 / 3; grid-row: 1 / 2;">
    <div></div>
    <div style="grid-column: 5 / 7;"></div>
  </div>
</div>

</body>
</html>
