<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    A grid container which is not a grid item treats a subgrid template as none
  </title>
</head>
<body>

<div id="test-root" style="width: 200px; height: 100px; display: grid; grid-template-columns: subgrid; grid-template-rows: subgrid;">
  <div style="width: 50px; height: 40px;"></div>
  <div style="width: 60px; height: 30px;"></div>
</div>

</body>
</html>
