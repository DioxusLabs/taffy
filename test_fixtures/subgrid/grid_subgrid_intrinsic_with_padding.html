<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../scripts/gentest/test_helper.js"></script>
  <link rel="stylesheet" type="text/css" href="../../scripts/gentest/test_base_style.css">
  <title>
    A subgrid's padding is added to its items' contributions to the parent's intrinsically-sized edge tracks
  </title>
</head>
<body>

<div id="test-root" style="display: grid; grid-template-columns: auto; grid-template-rows: auto;">
  <div style="display: grid; grid-template-columns: subgrid; grid-template-rows: 30px; grid-column: 1 / 2; padding: 0 10px;">
    <div style="width: 50px;"></div>
  </div>
</div>

</body>
</html>
